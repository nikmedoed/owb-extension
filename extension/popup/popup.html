<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OWB Tools</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="app">
    <header class="head">
      <img src="../icons/icon32.png" alt="" width="24" height="24">
      <h1>OWB Tools</h1>
    </header>

    <section class="batch-card">
      <p class="batch-title">Массовая выгрузка (текущее окно)</p>
      <div class="batch-actions">
        <button id="batchDownloadBtn" type="button">Скачать карточки в окне</button>
        <button id="batchDownloadAllBtn" type="button" class="alt">Скачать: все отзывы</button>
        <button id="batchCopyBtn" type="button">Копировать в буфер (окно)</button>
        <button id="batchCopyAllBtn" type="button" class="alt">Копировать: все отзывы</button>
      </div>
      <p id="statusLine" class="status-line"></p>
      <p id="metaLine" class="meta-line"></p>
      <p id="batchMetaLine" class="meta-line"></p>
    </section>

    <section class="batch-card">
      <div class="card-head">
        <p class="batch-title">Последняя сессия извлечения</p>
        <button id="copyLastSessionBtn" type="button" class="alt compact">Скопировать</button>
      </div>
      <textarea id="lastSessionText" rows="5" readonly placeholder="Здесь появится текст последней выгрузки..."></textarea>
    </section>

    <section id="quickChart" class="chart-card" hidden>
      <div class="chart-head">
        <p id="chartTitle" class="chart-title">График текущего товара</p>
        <button id="resetProductBtn" type="button" class="danger inline" hidden>Сбросить</button>
      </div>
      <p id="chartMeta" class="meta-line"></p>
      <canvas id="chartCanvas" width="296" height="96"></canvas>
      <p id="chartHint" class="meta-line"></p>
    </section>

    <button id="openOptionsBtn" class="link-btn" type="button">Открыть настройки расширения</button>
  </main>
  <script src="popup.js"></script>
</body>
</html>
